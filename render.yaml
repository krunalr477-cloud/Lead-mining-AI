# ============================================================================
# LeadMine AI — Render Blueprint
#
# Deploy this file by connecting your GitHub repository to Render.
# Documentation: https://render.com/docs/blueprint-spec
#
# Services defined:
#   1. leadmine-backend  — FastAPI (Python 3.12) Docker service on port 8000
#   2. leadmine-frontend — Next.js Docker service on port 3000
#   3. leadmine-db       — Render Postgres (free tier)
#   4. leadmine-redis    — Render Redis (free tier) for Celery broker + SSE
#
# Notes:
#   - Free Postgres expires after 30 days. Upgrade to paid to keep data.
#   - Free Redis expires after 30 days. Upgrade to paid to keep data.
#   - Free web services spin down after 15 min of inactivity (~1 min cold start).
#   - DEMO_MODE=true so mock adapters run without real provider keys.
#   - ADAPTER_MODE=mock forces all adapters to mock regardless of keys.
#   - The frontend Dockerfile ARG is set via build environment to point at
#     the backend service's internal Render URL.
# ============================================================================

services:

  # -- Backend: FastAPI (Python 3.12) ------------------------------------
  - type: web
    name: leadmine-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /api/v1/healthz
    envVars:
      # ---- Database (injected from connected service) ------------------
      - key: DATABASE_URL
        fromDatabase:
          name: leadmine-db
          property: connectionString
      # ---- Redis (injected from connected service) ----------------------
      - key: REDIS_URL
        fromService:
          type: redis
          name: leadmine-redis
          property: connectionString
      # ---- Core settings ------------------------------------------------
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: ADAPTER_MODE
        value: mock
      # ---- Internal service URLs (public domains for OAuth) ------------
      - key: APP_BASE_URL
        value: https://leadmine-backend.onrender.com
      - key: FRONTEND_URL
        value: https://leadmine-frontend.onrender.com
      # ---- Google OAuth (set these 2 manually in Render dashboard) ----
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: "https://leadmine-frontend.onrender.com/api/v1/auth/google/callback"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # ---- Third-party providers (optional, not needed in demo mode) ----
      - key: ROCKETREACH_API_KEY
        sync: false
      - key: MILLIONVERIFIER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: SERP_PROVIDER
        value: mock
      - key: SERP_API_KEY
        sync: false
      # ---- Security -----------------------------------------------------
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DEFAULT_SEND_LIMIT_PER_HOUR
        value: "100"
      - key: DEFAULT_SEND_LIMIT_PER_DAY
        value: "300"
      - key: VALIDATION_LLM_THRESHOLD
        value: "0.55"
      - key: ENABLE_FACEBOOK_SIGNALS
        value: "false"
      - key: ENABLE_LINKEDIN_CONNECTOR
        value: "false"
      - key: ENABLE_COMPLIANCE_GATED_SOURCES
        value: "false"

  # -- Frontend: Next.js -------------------------------------------------
  - type: web
    name: leadmine-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    buildCommand: |
      docker build -t leadmine-frontend \
        --build-arg LEADMINE_BACKEND_ORIGIN=http://leadmine-backend:8000 \
        .
    startCommand: docker run --rm -p 3000:3000 leadmine-frontend
    envVars:
      - key: LEADMINE_BACKEND_ORIGIN
        value: https://leadmine-backend.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY
        sync: false

databases:
  - name: leadmine-db
    plan: free
    databaseName: leadmine
    user: leadmine

redis:
  - name: leadmine-redis
    plan: free
