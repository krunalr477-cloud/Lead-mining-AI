# ============================================================================
# LeadMine AI — Render Blueprint
#
# Deploy this file by connecting your GitHub repository to Render.
# Documentation: https://render.com/docs/blueprint-spec
#
# Services defined:
#   1. leadmine-backend — FastAPI (Python 3.12) Docker service on port 8000
#   2. leadmine-frontend — Next.js Docker service on port 3000
#   3. leadmine-db      — Render Postgres (free tier)
#
# Notes:
#   - Free Postgres expires after 30 days. Upgrade to paid to keep data.
#   - Free web services spin down after 15 min of inactivity (~1 min cold start).
#   - DEMO_MODE=true so no real Redis/API calls are needed.
#   - No code changes needed; this Blueprint uses the existing Dockerfiles.
# ============================================================================

services:

  # -- Backend: FastAPI (Python 3.12) ------------------------------------
  - type: web
    name: leadmine-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: Dockerfile
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    healthCheckPath: /api/v1/healthz
    envVars:
      # ---- Database (injected from connected service) ------------------
      - key: DATABASE_URL
        fromDatabase:
          name: leadmine-db
          property: connectionString
      # ---- Core settings ------------------------------------------------
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEMO_MODE
        value: "true"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: ADAPTER_MODE
        value: mock
      # ---- Redis placeholder (not used in demo mode) --------------------
      - key: REDIS_URL
        value: redis://localhost:6379/0
      # ---- Internal service URLs (constructed from hostport) ------------
      #    hostport gives "name:port" (e.g. leadmine-backend:8000)
      #    We prepend http:// to build the full URL
      - key: APP_BASE_URL
        value: http://leadmine-backend:8000
      - key: FRONTEND_URL
        value: http://leadmine-frontend:3000
      # ---- Google OAuth (optional) -------------------------------------
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: ""
      # ---- Third-party providers (optional) ----------------------------
      - key: ROCKETREACH_API_KEY
        sync: false
      - key: MILLIONVERIFIER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: SERP_PROVIDER
        value: mock
      - key: SERP_API_KEY
        sync: false
      # ---- Security -----------------------------------------------------
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DEFAULT_SEND_LIMIT_PER_HOUR
        value: "100"
      - key: DEFAULT_SEND_LIMIT_PER_DAY
        value: "300"
      - key: VALIDATION_LLM_THRESHOLD
        value: "0.55"
      - key: ENABLE_FACEBOOK_SIGNALS
        value: "false"
      - key: ENABLE_LINKEDIN_CONNECTOR
        value: "false"
      - key: ENABLE_COMPLIANCE_GATED_SOURCES
        value: "false"

  # -- Frontend: Next.js -------------------------------------------------
  - type: web
    name: leadmine-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    region: oregon
    plan: free
    autoDeploy: true
    branch: main
    envVars:
      - key: LEADMINE_BACKEND_ORIGIN
        value: http://leadmine-backend:8000
      - key: NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY
        sync: false

databases:
  - name: leadmine-db
    plan: free
    databaseName: leadmine
    user: leadmine
